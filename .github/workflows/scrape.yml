name: Blinkit Scraper — 5x Daily

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          CATEGORY_URL: ${{ vars.CATEGORY_URL || 'https://blinkit.com/cn/munchies/makhana-more/cid/1237/816' }}
          PINCODE: ${{ vars.PINCODE || '110001' }}
          DEFAULT_LAT: ${{ vars.DEFAULT_LAT || '28.6139' }}
          DEFAULT_LNG: ${{ vars.DEFAULT_LNG || '77.2090' }}
          MAX_PRODUCTS: ${{ vars.MAX_PRODUCTS || '100' }}
        run: |
          python main.py category \
            "$CATEGORY_URL" \
            --max "$MAX_PRODUCTS" \
            --pincode "$PINCODE" \
            --lat "$DEFAULT_LAT" \
            --lng "$DEFAULT_LNG" \
            --save-db \
            --output "run_$(date -u +%Y%m%d_%H%M%S).json"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/blinkit.db output/*.json || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
